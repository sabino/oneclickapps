caproverOneClickApp:
  variables:
    - id: "$$cap_abctl_version"
      label: "abctl version"
      defaultValue: "v0.30.4"
      description: "Pinned Airbyte bootstrap CLI version used inside the manager container."
      validRegex: "/^([^\\s^\\/])+$/"
    - id: "$$cap_airbyte_chart_version"
      label: "Airbyte chart version"
      defaultValue: "2.0.19"
      description: "Pinned official Airbyte Helm chart version."
      validRegex: "/^([^\\s^\\/])+$/"
    - id: "$$cap_airbyte_host_port"
      label: "Host ingress port"
      defaultValue: ""
      description: "Required. Choose an unused host port for the Airbyte kind ingress, for example 18080. Current limitation: only one Airbyte deployment per host is supported while this app uses abctl local."
      validRegex: "/^\\d+$/"
    - id: "$$cap_additional_hosts"
      label: "Additional hosts"
      defaultValue: ""
      description: "Optional comma-separated hostnames to add to the Airbyte ingress, for example airbyte.example.com."
    - id: "$$cap_airbyte_low_resource_mode"
      label: "Low resource mode"
      defaultValue: "true"
      description: "Recommended on smaller hosts. This mirrors the official abctl --low-resource-mode flag."
      validRegex: "/^(true|false)$/"
    - id: "$$cap_airbyte_disable_auth"
      label: "Disable auth"
      defaultValue: "false"
      description: "Optional. Turn off the built-in Airbyte auth wall."
      validRegex: "/^(true|false)$/"
    - id: "$$cap_airbyte_insecure_cookies"
      label: "Allow insecure cookies"
      defaultValue: "true"
      description: "Recommended behind the CapRover reverse-proxy chain so first login does not fail on cookie restrictions."
      validRegex: "/^(true|false)$/"
    - id: "$$cap_airbyte_manager_mode"
      label: "Manager mode"
      defaultValue: "install"
      description: "Use install for normal operation. Switch to uninstall before deleting the app if you want the manager to remove the kind cluster for you."
      validRegex: "/^(install|uninstall)$/"
    - id: "$$cap_airbyte_remove_persisted_data"
      label: "Remove persisted data on uninstall"
      defaultValue: "false"
      description: "Only used when Manager mode is uninstall. Set to true if you want abctl local uninstall --persisted."
      validRegex: "/^(true|false)$/"
  instructions:
    start: "Airbyte is deployed as a manager app that talks to the host Docker daemon and creates the official Airbyte kind cluster under the hood.\n\nImportant notes:\n- Current limitation: only one Airbyte deployment per host is supported because abctl local uses a singleton kind cluster under the hood.\n- Choose an unused Host ingress port for the Airbyte ingress on this host.\n- The first install can take several minutes while abctl creates the cluster and installs the Helm chart.\n- This app mounts /var/run/docker.sock and adds the required Linux capabilities through cap_add.\n- If you later want to remove the Airbyte cluster from the host, switch Manager mode to uninstall, redeploy, wait for completion, and only then delete the CapRover app."
    end: "Airbyte manager has been deployed.\n\nNext steps:\n1. Enable HTTPS for $$cap_appname in CapRover.\n2. Open https://$$cap_appname.$$cap_root_domain\n3. If Airbyte is still bootstrapping, keep the page open or refresh after a few minutes.\n4. If you want to add a custom domain later, set Additional hosts and redeploy the manager."
  displayName: "Airbyte"
  isOfficial: false
  description: "Airbyte bootstrap app for CapRover. Runs abctl against the host Docker socket, creates the kind cluster, and proxies the Airbyte UI through the CapRover app domain. One deployment per host for now."
  documentation: "https://docs.airbyte.com/platform/using-airbyte/getting-started/oss-quickstart"
