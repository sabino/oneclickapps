# This file is generated by scripts/generate_airbyte.js.
# Do not edit public/v4/apps/airbyte.yml by hand; update the generator or
# files under scripts/airbyte-assets/ and then run `npm run generate_airbyte`.
captainVersion: 4
services:
  $$cap_appname:
    restart: "unless-stopped"
    cap_add:
      - "SYS_ADMIN"
      - "NET_ADMIN"
    volumes:
      - "$$cap_appname-manager-data:/var/lib/airbyte-manager"
      - "/var/run/docker.sock:/var/run/docker.sock"
    environment:
      AIRBYTE_MANAGER_HOME: "/var/lib/airbyte-manager"
      AIRBYTE_DOMAIN: "$$cap_appname.$$cap_root_domain"
      AIRBYTE_ADDITIONAL_HOSTS: "$$cap_additional_hosts"
      AIRBYTE_HOST_PORT: "$$cap_airbyte_host_port"
      AIRBYTE_CHART_VERSION: "$$cap_airbyte_chart_version"
      AIRBYTE_MANAGER_MODE: "$$cap_airbyte_manager_mode"
      AIRBYTE_RUNNER_NAME: "$$cap_appname-airbyte-runner"
      AIRBYTE_LOW_RESOURCE_MODE: "$$cap_airbyte_low_resource_mode"
      AIRBYTE_DISABLE_AUTH: "$$cap_airbyte_disable_auth"
      AIRBYTE_INSECURE_COOKIES: "$$cap_airbyte_insecure_cookies"
      AIRBYTE_REMOVE_PERSISTED_DATA: "$$cap_airbyte_remove_persisted_data"
    caproverExtra:
      containerHttpPort: "80"
      dockerfileLines:
        - "FROM debian:bookworm-slim"
        - "RUN apt-get update && \\"
        - "    apt-get install -y --no-install-recommends \\"
        - "      bash \\"
        - "      ca-certificates \\"
        - "      curl \\"
        - "      docker.io \\"
        - "      gettext-base \\"
        - "      iproute2 \\"
        - "      iptables \\"
        - "      nginx-light \\"
        - "      procps && \\"
        - "    rm -rf /var/lib/apt/lists/*"
        - "ARG ABCTL_VERSION=$$cap_abctl_version"
        - "RUN arch=$(dpkg --print-architecture) && \\"
        - "    case \"$arch\" in \\"
        - "      amd64) airbyte_arch=linux-amd64 ;; \\"
        - "      arm64) airbyte_arch=linux-arm64 ;; \\"
        - "      *) echo \"unsupported arch: $arch\" >&2; exit 1 ;; \\"
        - "    esac && \\"
        - "    curl -fsSL -o /tmp/abctl.tgz \"https://github.com/airbytehq/abctl/releases/download/${ABCTL_VERSION}/abctl-${ABCTL_VERSION}-${airbyte_arch}.tar.gz\" && \\"
        - "    tar -xzf /tmp/abctl.tgz -C /tmp && \\"
        - "    install -m 0755 /tmp/abctl-${ABCTL_VERSION}-${airbyte_arch}/abctl /usr/local/bin/abctl && \\"
        - "    rm -rf /tmp/abctl.tgz /tmp/abctl-${ABCTL_VERSION}-${airbyte_arch}"
        - |-
          RUN mkdir -p /usr/local/bin && \
              printf '%b' '#!/bin/sh\nset -eu\n\nAIRBYTE_MANAGER_HOME="${AIRBYTE_MANAGER_HOME:-/var/lib/airbyte-manager}"\nAIRBYTE_RUNTIME_DIR="${AIRBYTE_RUNTIME_DIR:-$AIRBYTE_MANAGER_HOME/runtime}"\nAIRBYTE_LOG_DIR="${AIRBYTE_LOG_DIR:-$AIRBYTE_MANAGER_HOME/logs}"\nSTATUS_FILE="${AIRBYTE_RUNTIME_DIR}/status.json"\nLOCK_DIR="${AIRBYTE_RUNTIME_DIR}/install.lock"\nHOST_GATEWAY="${AIRBYTE_HOST_GATEWAY:-$(ip route | awk '"'"'/default/ { print $3; exit }'"'"')}"\nRUNNER_NAME="${AIRBYTE_RUNNER_NAME:-airbyte-manager-runner}"\n\nmkdir -p "$AIRBYTE_RUNTIME_DIR" "$AIRBYTE_LOG_DIR" "$AIRBYTE_MANAGER_HOME"\n\nwrite_status() {\n  state="$1"\n  message="$2"\n  cat >"${STATUS_FILE}.tmp" <<EOF\n{"state":"${state}","message":"${message}","mode":"${AIRBYTE_MANAGER_MODE:-install}","updatedAt":"$(date -u +"%Y-%m-%dT%H:%M:%SZ")","target":"http://${HOST_GATEWAY}:${AIRBYTE_HOST_PORT}"}\nEOF\n  mv "${STATUS_FILE}.tmp" "$STATUS_FILE"\n}\n\ncleanup_stale_lock() {\n  if [ ! -d "$LOCK_DIR" ]; then\n    return 0\n  fi\n\n  if docker ps --format '"'"'{{.Names}}'"'"' | grep -Fx "$RUNNER_NAME" >/dev/null 2>&1; then\n    return 0\n  fi\n\n  rm -rf "$LOCK_DIR"\n}\n\ndetect_manager_mount() {\n  mount_spec="$(docker inspect "$HOSTNAME" --format '"'"'{{range .Mounts}}{{if eq .Destination "/var/lib/airbyte-manager"}}{{if .Name}}{{.Name}}{{else}}{{.Source}}{{end}}|{{.Type}}{{end}}{{end}}'"'"' 2>/dev/null || true)"\n  [ -n "$mount_spec" ] || return 1\n\n  mount_value="${mount_spec%|*}"\n  mount_type="${mount_spec##*|}"\n\n  case "$mount_type" in\n    volume)\n      printf '"'"'%s|volume\\n'"'"' "$mount_value"\n      ;;\n    bind)\n      printf '"'"'%s|bind\\n'"'"' "$mount_value"\n      ;;\n    *)\n      return 1\n      ;;\n  esac\n}\n\ndetect_runner_image() {\n  docker inspect "$HOSTNAME" --format '"'"'{{.Config.Image}}'"'"'\n}\n\nrun_host_runner() {\n  mount_info="$(detect_manager_mount)" || {\n    write_status "error" "Unable to detect the Airbyte manager volume mount from the live container."\n    return 1\n  }\n  mount_value="${mount_info%|*}"\n  runner_image="$(detect_runner_image)" || {\n    write_status "error" "Unable to detect the Airbyte manager image from the live container."\n    return 1\n  }\n\n  docker rm -f "$RUNNER_NAME" >/dev/null 2>&1 || true\n\n  set -- docker run --rm --name "$RUNNER_NAME" --network host \\\n    -v /var/run/docker.sock:/var/run/docker.sock\n\n  set -- "$@" -v "${mount_value}:/var/lib/airbyte-manager"\n  set -- "$@" \\\n    -e "AIRBYTE_MANAGER_HOME=$AIRBYTE_MANAGER_HOME" \\\n    -e "AIRBYTE_RUNTIME_DIR=$AIRBYTE_RUNTIME_DIR" \\\n    -e "AIRBYTE_LOG_DIR=$AIRBYTE_LOG_DIR" \\\n    -e "AIRBYTE_DOMAIN=$AIRBYTE_DOMAIN" \\\n    -e "AIRBYTE_ADDITIONAL_HOSTS=${AIRBYTE_ADDITIONAL_HOSTS:-}" \\\n    -e "AIRBYTE_HOST_PORT=$AIRBYTE_HOST_PORT" \\\n    -e "AIRBYTE_CHART_VERSION=$AIRBYTE_CHART_VERSION" \\\n    -e "AIRBYTE_MANAGER_MODE=${AIRBYTE_MANAGER_MODE:-install}" \\\n    -e "AIRBYTE_LOW_RESOURCE_MODE=${AIRBYTE_LOW_RESOURCE_MODE:-true}" \\\n    -e "AIRBYTE_DISABLE_AUTH=${AIRBYTE_DISABLE_AUTH:-false}" \\\n    -e "AIRBYTE_INSECURE_COOKIES=${AIRBYTE_INSECURE_COOKIES:-true}" \\\n    -e "AIRBYTE_REMOVE_PERSISTED_DATA=${AIRBYTE_REMOVE_PERSISTED_DATA:-false}" \\\n    -e "AIRBYTE_TARGET_HOST=$HOST_GATEWAY" \\\n    --entrypoint /bin/sh \\\n    "$runner_image" \\\n    /usr/local/bin/airbyte-host-runner.sh\n\n  "$@"\n}\n\nmain() {\n  cleanup_stale_lock\n\n  if ! mkdir "$LOCK_DIR" 2>/dev/null; then\n    write_status "waiting" "Another Airbyte manager process is already running."\n    exit 0\n  fi\n  trap '"'"'rmdir "$LOCK_DIR" >/dev/null 2>&1 || true'"'"' EXIT\n\n  case "${AIRBYTE_MANAGER_MODE:-install}" in\n    uninstall)\n      write_status "uninstalling" "Removing the Airbyte kind cluster and Helm release."\n      if run_host_runner; then\n        write_status "uninstalled" "Airbyte has been removed from the host. It is now safe to delete this CapRover app."\n        exit 0\n      fi\n      write_status "error" "Airbyte uninstall failed. Check the manager logs."\n      exit 1\n      ;;\n    install)\n      ;;\n    *)\n      write_status "error" "Unknown AIRBYTE_MANAGER_MODE value."\n      exit 1\n      ;;\n  esac\n\n  write_status "installing" "Launching the host-networked Airbyte runner. This can take several minutes on the first run."\n\n  run_host_runner || {\n    write_status "error" "Airbyte host runner failed. Check the manager logs."\n    exit 1\n  }\n}\n\nmain "$@"\n' > /usr/local/bin/install-airbyte.sh && \
              chmod +x /usr/local/bin/install-airbyte.sh
        - |-
          RUN mkdir -p /usr/local/bin && \
              printf '%b' '#!/bin/sh\nset -eu\n\nAIRBYTE_MANAGER_HOME="${AIRBYTE_MANAGER_HOME:-/var/lib/airbyte-manager}"\nAIRBYTE_RUNTIME_DIR="${AIRBYTE_RUNTIME_DIR:-$AIRBYTE_MANAGER_HOME/runtime}"\nAIRBYTE_LOG_DIR="${AIRBYTE_LOG_DIR:-$AIRBYTE_MANAGER_HOME/logs}"\nSTATUS_FILE="${AIRBYTE_RUNTIME_DIR}/status.json"\nTARGET_HOST="${AIRBYTE_TARGET_HOST:-127.0.0.1}"\nAIRBYTE_VALUES_FILE="${AIRBYTE_VALUES_FILE:-/opt/airbyte-manager/airbyte-values.yaml}"\n\nmkdir -p "$AIRBYTE_MANAGER_HOME" "$AIRBYTE_RUNTIME_DIR" "$AIRBYTE_LOG_DIR" "$AIRBYTE_MANAGER_HOME/.airbyte"\nrm -rf /root/.airbyte\nln -s "$AIRBYTE_MANAGER_HOME/.airbyte" /root/.airbyte\n\nexport HOME="$AIRBYTE_MANAGER_HOME"\nexport DO_NOT_TRACK=1\nAIRBYTE_CLUSTER_NAME="${AIRBYTE_CLUSTER_NAME:-airbyte-abctl}"\nAIRBYTE_KUBECONFIG_PATH="${AIRBYTE_KUBECONFIG_PATH:-$AIRBYTE_MANAGER_HOME/.airbyte/abctl/abctl.kubeconfig}"\n\nwrite_status() {\n  state="$1"\n  message="$2"\n  cat >"${STATUS_FILE}.tmp" <<EOF\n{"state":"${state}","message":"${message}","mode":"${AIRBYTE_MANAGER_MODE:-install}","updatedAt":"$(date -u +"%Y-%m-%dT%H:%M:%SZ")","target":"http://${TARGET_HOST}:${AIRBYTE_HOST_PORT}"}\nEOF\n  mv "${STATUS_FILE}.tmp" "$STATUS_FILE"\n}\n\nlocal_install_exists() {\n  [ -s "$AIRBYTE_KUBECONFIG_PATH" ]\n}\n\ncluster_exists() {\n  kind get clusters 2>/dev/null | grep -Fx "$AIRBYTE_CLUSTER_NAME" >/dev/null 2>&1\n}\n\ndetect_existing_cluster_port() {\n  docker inspect "$AIRBYTE_CLUSTER_NAME-control-plane" \\\n    --format '"'"'{{with index .HostConfig.PortBindings "80/tcp"}}{{(index . 0).HostPort}}{{end}}'"'"' \\\n    2>/dev/null || true\n}\n\nensure_single_install_supported() {\n  if ! cluster_exists; then\n    return 0\n  fi\n\n  existing_port="$(detect_existing_cluster_port)"\n\n  if ! local_install_exists; then\n    write_status \\\n      "error" \\\n      "Another Airbyte local cluster already exists on this host${existing_port:+ on port ${existing_port}}. The current manager uses abctl local, which only supports a single Airbyte deployment per host for now. Reuse the existing Airbyte app or uninstall it before creating a new one."\n    return 1\n  fi\n\n  if [ -n "$existing_port" ] && [ "$existing_port" != "$AIRBYTE_HOST_PORT" ]; then\n    write_status \\\n      "error" \\\n      "This Airbyte installation is already bound to host ingress port ${existing_port}. Changing the host port requires uninstalling the existing Airbyte cluster first, then deploying again with the new port."\n    return 1\n  fi\n}\n\nwait_for_ingress() {\n  attempt=0\n  while [ "$attempt" -lt 60 ]; do\n    if curl -fsS -I \\\n      -H "Host: $AIRBYTE_DOMAIN" \\\n      "http://127.0.0.1:${AIRBYTE_HOST_PORT}/" >/dev/null 2>&1; then\n      return 0\n    fi\n    attempt=$((attempt + 1))\n    sleep 2\n  done\n  return 1\n}\n\nbuild_install_args() {\n  set -- local install \\\n    --chart-version "$AIRBYTE_CHART_VERSION" \\\n    --host "${AIRBYTE_DOMAIN}${AIRBYTE_ADDITIONAL_HOSTS:+,${AIRBYTE_ADDITIONAL_HOSTS}}" \\\n    --no-browser \\\n    --port "$AIRBYTE_HOST_PORT" \\\n    --values "$AIRBYTE_VALUES_FILE"\n\n  if [ "${AIRBYTE_LOW_RESOURCE_MODE:-true}" = "true" ]; then\n    set -- "$@" --low-resource-mode\n  fi\n\n  if [ "${AIRBYTE_DISABLE_AUTH:-false}" = "true" ]; then\n    set -- "$@" --disable-auth\n  fi\n\n  if [ "${AIRBYTE_INSECURE_COOKIES:-true}" = "true" ]; then\n    set -- "$@" --insecure-cookies\n  fi\n\n  printf '"'"'%s\\n'"'"' "$@"\n}\n\nrun_install() {\n  set -- $(build_install_args)\n  abctl "$@"\n}\n\nrun_uninstall() {\n  set -- local uninstall\n\n  if [ "${AIRBYTE_REMOVE_PERSISTED_DATA:-false}" = "true" ]; then\n    set -- "$@" --persisted\n  fi\n\n  abctl "$@"\n}\n\nmain() {\n  case "${AIRBYTE_MANAGER_MODE:-install}" in\n    uninstall)\n      write_status "uninstalling" "Removing the Airbyte kind cluster and Helm release."\n      if run_uninstall; then\n        write_status "uninstalled" "Airbyte has been removed from the host. It is now safe to delete this CapRover app."\n        exit 0\n      fi\n      write_status "error" "Airbyte uninstall failed. Check the manager logs."\n      exit 1\n      ;;\n    install)\n      ;;\n    *)\n      write_status "error" "Unknown AIRBYTE_MANAGER_MODE value."\n      exit 1\n      ;;\n  esac\n\n  write_status "installing" "Bootstrapping Airbyte with abctl on the host Docker daemon. This can take several minutes on the first run."\n\n  ensure_single_install_supported || exit 1\n\n  run_install || {\n    write_status "error" "Airbyte install failed. Check the manager logs."\n    exit 1\n  }\n\n  if abctl local status >/dev/null 2>&1 && wait_for_ingress; then\n    write_status "ready" "Airbyte is installed and the manager proxy is routing traffic to the host ingress."\n    exit 0\n  fi\n\n  write_status "warning" "Airbyte installed, but the local ingress is not answering on the configured host port yet. Inspect the manager logs if the UI does not load."\n}\n\nmain "$@"\n' > /usr/local/bin/airbyte-host-runner.sh && \
              chmod +x /usr/local/bin/airbyte-host-runner.sh
        - |-
          RUN mkdir -p /usr/local/bin && \
              printf '%b' '#!/bin/sh\nset -eu\n\nexport AIRBYTE_MANAGER_HOME="${AIRBYTE_MANAGER_HOME:-/var/lib/airbyte-manager}"\nexport AIRBYTE_RUNTIME_DIR="${AIRBYTE_RUNTIME_DIR:-$AIRBYTE_MANAGER_HOME/runtime}"\nexport AIRBYTE_LOG_DIR="${AIRBYTE_LOG_DIR:-$AIRBYTE_MANAGER_HOME/logs}"\nexport AIRBYTE_HOST_GATEWAY="${AIRBYTE_HOST_GATEWAY:-$(ip route | awk '"'"'/default/ { print $3; exit }'"'"')}"\nexport AIRBYTE_PROXY_UPSTREAM="http://${AIRBYTE_HOST_GATEWAY}:${AIRBYTE_HOST_PORT}"\nexport AIRBYTE_PROXY_UPSTREAM_HOSTPORT="${AIRBYTE_HOST_GATEWAY}:${AIRBYTE_HOST_PORT}"\n\nmkdir -p "$AIRBYTE_MANAGER_HOME" "$AIRBYTE_RUNTIME_DIR" "$AIRBYTE_LOG_DIR" /var/cache/nginx /var/run\nmkdir -p "$AIRBYTE_MANAGER_HOME/.airbyte"\nrm -rf /root/.airbyte\nln -s "$AIRBYTE_MANAGER_HOME/.airbyte" /root/.airbyte\n\ncat >"${AIRBYTE_RUNTIME_DIR}/status.json" <<EOF\n{"state":"booting","message":"Starting the Airbyte manager container.","mode":"${AIRBYTE_MANAGER_MODE:-install}","updatedAt":"$(date -u +"%Y-%m-%dT%H:%M:%SZ")","target":"${AIRBYTE_PROXY_UPSTREAM}"}\nEOF\n\nenvsubst '"'"'${AIRBYTE_PROXY_UPSTREAM} ${AIRBYTE_PROXY_UPSTREAM_HOSTPORT}'"'"' \\\n  </opt/airbyte-manager/nginx.conf.template \\\n  >/etc/nginx/nginx.conf\n\n/usr/local/bin/install-airbyte.sh >>"${AIRBYTE_LOG_DIR}/install.log" 2>&1 &\n\nexec nginx -g '"'"'daemon off;'"'"'\n' > /usr/local/bin/airbyte-entrypoint.sh && \
              chmod +x /usr/local/bin/airbyte-entrypoint.sh
        - |-
          RUN mkdir -p /opt/airbyte-manager && \
              printf '%b' 'worker_processes auto;\npid /run/nginx.pid;\n\nevents {\n  worker_connections 1024;\n}\n\nhttp {\n  include /etc/nginx/mime.types;\n  default_type application/octet-stream;\n  sendfile on;\n  tcp_nopush on;\n  tcp_nodelay on;\n  server_tokens off;\n\n  map $http_upgrade $connection_upgrade {\n    default upgrade;\n    '"'"''"'"' close;\n  }\n\n  map $http_x_forwarded_proto $forwarded_proto {\n    default $http_x_forwarded_proto;\n    '"'"''"'"' https;\n  }\n\n  upstream airbyte_upstream {\n    server ${AIRBYTE_PROXY_UPSTREAM_HOSTPORT};\n    keepalive 32;\n  }\n\n  server {\n    listen 80;\n    server_name _;\n    client_max_body_size 128m;\n\n    location = /_airbyte-manager/status {\n      root /var/lib/airbyte-manager/runtime;\n      default_type application/json;\n      add_header Cache-Control "no-store";\n      try_files /status.json =404;\n    }\n\n    location = /__bootstrapping.html {\n      root /opt/airbyte-manager;\n      default_type text/html;\n      add_header Cache-Control "no-store";\n      try_files /bootstrapping.html =200;\n    }\n\n    location / {\n      proxy_pass http://airbyte_upstream;\n      proxy_http_version 1.1;\n      proxy_set_header Host $http_host;\n      proxy_set_header X-Forwarded-Host $http_host;\n      proxy_set_header X-Forwarded-Proto $forwarded_proto;\n      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n      proxy_set_header Upgrade $http_upgrade;\n      proxy_set_header Connection $connection_upgrade;\n      proxy_read_timeout 3600s;\n      proxy_send_timeout 3600s;\n      proxy_connect_timeout 60s;\n      proxy_intercept_errors on;\n      error_page 502 503 504 =200 /__bootstrapping.html;\n    }\n  }\n}\n' > /opt/airbyte-manager/nginx.conf.template
        - |-
          RUN mkdir -p /opt/airbyte-manager && \
              printf '%b' '<!doctype html>\n<html lang="en">\n  <head>\n    <meta charset="utf-8" />\n    <title>Airbyte is bootstrapping</title>\n    <meta name="viewport" content="width=device-width, initial-scale=1.0" />\n    <style>\n      :root {\n        color-scheme: dark;\n        --page-bg: #0b1017;\n        --surface: #121926;\n        --border: rgba(148, 163, 184, 0.18);\n        --text: #ecf3fb;\n        --muted: #b2c0d1;\n        --accent: #16c47f;\n      }\n      * { box-sizing: border-box; }\n      html, body {\n        margin: 0;\n        min-height: 100%;\n        background: var(--page-bg);\n        color: var(--text);\n        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;\n      }\n      body {\n        min-height: 100vh;\n        display: grid;\n        place-items: center;\n        padding: 24px;\n      }\n      .panel {\n        width: min(760px, 100%);\n        background: var(--surface);\n        border: 1px solid var(--border);\n        border-radius: 18px;\n        padding: 28px;\n        box-shadow: 0 18px 48px rgba(2, 6, 23, 0.35);\n      }\n      .eyebrow {\n        color: #7f90a8;\n        font-size: 0.85rem;\n        font-weight: 700;\n        letter-spacing: 0.08em;\n        text-transform: uppercase;\n      }\n      h1 {\n        margin: 8px 0 12px;\n        font-size: clamp(1.7rem, 3vw, 2.3rem);\n        letter-spacing: -0.03em;\n      }\n      p {\n        margin: 0 0 14px;\n        color: var(--muted);\n        line-height: 1.7;\n      }\n      .status {\n        margin-top: 18px;\n        padding: 16px 18px;\n        border-radius: 14px;\n        border: 1px solid var(--border);\n        background: rgba(255, 255, 255, 0.02);\n      }\n      .status strong {\n        color: var(--text);\n      }\n      .status code {\n        display: inline-block;\n        margin-top: 8px;\n        padding: 0.18rem 0.45rem;\n        border-radius: 8px;\n        background: rgba(22, 196, 127, 0.1);\n        color: #b7f7db;\n      }\n      .hint {\n        margin-top: 18px;\n        font-size: 0.94rem;\n      }\n      .ready {\n        color: var(--accent);\n      }\n    </style>\n  </head>\n  <body>\n    <main class="panel">\n      <div class="eyebrow">Airbyte manager</div>\n      <h1>Airbyte is still bootstrapping</h1>\n      <p>\n        The CapRover app is up, but the Airbyte Kubernetes stack is still being created on the host by\n        <code>abctl</code>. The first run usually takes a few minutes.\n      </p>\n      <section class="status" id="statusBox">\n        <strong id="statusState">Checking status...</strong>\n        <p id="statusMessage">Waiting for the manager to write the current install state.</p>\n        <code id="statusTarget">target: pending</code>\n      </section>\n      <p class="hint">\n        This page refreshes itself when Airbyte is ready. If it stays here for too long, inspect the\n        CapRover app logs for the manager service.\n      </p>\n    </main>\n    <script>\n      async function refreshStatus() {\n        try {\n          const response = await fetch('"'"'/_airbyte-manager/status'"'"', { cache: '"'"'no-store'"'"' });\n          if (!response.ok) return;\n\n          const payload = await response.json();\n          document.getElementById('"'"'statusState'"'"').textContent = `State: ${payload.state}`;\n          document.getElementById('"'"'statusMessage'"'"').textContent = payload.message || '"'"''"'"';\n          document.getElementById('"'"'statusTarget'"'"').textContent = payload.target ? `target: ${payload.target}` : '"'"'target: pending'"'"';\n\n          if (payload.state === '"'"'ready'"'"') {\n            document.getElementById('"'"'statusState'"'"').classList.add('"'"'ready'"'"');\n            window.setTimeout(() => window.location.reload(), 1500);\n          }\n        } catch (error) {\n          console.error(error);\n        }\n      }\n\n      refreshStatus();\n      window.setInterval(refreshStatus, 4000);\n    </script>\n  </body>\n</html>\n' > /opt/airbyte-manager/bootstrapping.html
