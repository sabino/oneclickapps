captainVersion: 4
services:
    $$cap_appname:
        restart: 'unless-stopped'
        volumes:
            - '$$cap_appname-data:/data'
        environment:
            NODE_ENV: 'production'
            PORT: '3000'
            HOSTNAME: '0.0.0.0'
            HOME: '/data/home'
            DATABASE_URL: 'file:/data/cc.db'
            PROJECTS_DIR: '/data/projects'
            SETTINGS_DIR: '/data'
            NEXT_PUBLIC_APP_URL: 'https://$$cap_appname.$$cap_root_domain'
            PREVIEW_PORT_START: '$$cap_preview_port_start'
            PREVIEW_PORT_END: '$$cap_preview_port_end'
            ENCRYPTION_KEY: '$$cap_encryption_key'
            NPM_GLOBAL_PATH: '/usr/local/bin'
            NPM_CONFIG_CACHE: '/data/npm-cache'
            NEXT_TELEMETRY_DISABLED: '1'
            CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: '1'
            ANTHROPIC_API_KEY: '$$cap_anthropic_api_key'
            OPENAI_API_KEY: '$$cap_openai_api_key'
            QWEN_API_KEY: '$$cap_qwen_api_key'
            ZHIPU_API_KEY: '$$cap_zhipu_api_key'
            GITHUB_TOKEN: '$$cap_github_token'
        caproverExtra:
            containerHttpPort: '3000'
            websocketSupport: 'true'
            dockerfileLines:
                - 'FROM node:22-bookworm-slim'
                - 'ARG CLAUDABLE_REF=$$cap_claudable_ref'
                - 'ARG CLAUDE_CODE_VERSION=$$cap_claude_code_version'
                - 'ARG CODEX_CLI_VERSION=$$cap_codex_cli_version'
                - 'ARG QWEN_CODE_VERSION=$$cap_qwen_code_version'
                - 'ENV NEXT_TELEMETRY_DISABLED=1 CI=1'
                - |-
                    RUN apt-get update && \
                        apt-get install -y --no-install-recommends \
                          bash \
                          ca-certificates \
                          curl \
                          git \
                          gosu \
                          make \
                          openssh-client \
                          procps \
                          python3 \
                          g++ && \
                        rm -rf /var/lib/apt/lists/*
                - 'RUN corepack enable'
                - 'WORKDIR /opt/claudable'
                - |-
                    RUN git init . && \
                        git remote add origin https://github.com/opactorai/Claudable.git && \
                        git fetch --depth 1 origin "$CLAUDABLE_REF" && \
                        git checkout --detach FETCH_HEAD
                - 'RUN npm ci'
                - 'RUN npm run build'
                - 'RUN cp -r public .next/standalone/ && mkdir -p .next/standalone/.next && cp -r .next/static .next/standalone/.next/static'
                - |-
                    RUN npm install -g \
                          "@anthropic-ai/claude-code@${CLAUDE_CODE_VERSION}" \
                          "@openai/codex@${CODEX_CLI_VERSION}" \
                          "@qwen-code/qwen-code@${QWEN_CODE_VERSION}" && \
                        npm cache clean --force
                - 'RUN useradd --create-home --home-dir /data/home --shell /bin/bash claudable'
                - |-
                    RUN mkdir -p /usr/local/bin && \
                        printf '%b' '#!/bin/sh\nset -eu\n\nif [ "$(id -u)" = "0" ]; then\n  mkdir -p /data/projects /data/uploads /data/home /data/npm-cache /data/tmp\n  rm -rf /opt/claudable/data /opt/claudable/public/uploads /opt/claudable/.next/standalone/data /opt/claudable/.next/standalone/public/uploads\n  ln -s /data /opt/claudable/data\n  ln -s /data/uploads /opt/claudable/public/uploads\n  ln -s /data /opt/claudable/.next/standalone/data\n  ln -s /data/uploads /opt/claudable/.next/standalone/public/uploads\n  mkdir -p /opt/claudable/.next/standalone/.next/cache/images\n  chown -R claudable:claudable /data /opt/claudable/.next/standalone/.next/cache\n  chown -h claudable:claudable /opt/claudable/data /opt/claudable/public/uploads /opt/claudable/.next/standalone/data /opt/claudable/.next/standalone/public/uploads\n  exec gosu claudable /usr/local/bin/claudable-entrypoint.sh "$@"\nfi\n\nexport NODE_ENV="${NODE_ENV:-production}"\nexport PORT="${PORT:-3000}"\nexport HOSTNAME="${HOSTNAME:-0.0.0.0}"\nexport HOME="${HOME:-/data/home}"\nexport DATABASE_URL="${DATABASE_URL:-file:/data/cc.db}"\nexport PROJECTS_DIR="${PROJECTS_DIR:-/data/projects}"\nexport SETTINGS_DIR="${SETTINGS_DIR:-/data}"\nexport NPM_CONFIG_CACHE="${NPM_CONFIG_CACHE:-/data/npm-cache}"\nexport TMPDIR="${TMPDIR:-/data/tmp}"\nexport NEXT_TELEMETRY_DISABLED="${NEXT_TELEMETRY_DISABLED:-1}"\nexport CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC="${CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC:-1}"\n\nmkdir -p "$PROJECTS_DIR" "$SETTINGS_DIR" "$HOME" "$NPM_CONFIG_CACHE" "$TMPDIR"\ncd /opt/claudable\n\nnpx prisma db push --skip-generate\ncd /opt/claudable/.next/standalone\nexec node server.js\n' > /usr/local/bin/claudable-entrypoint.sh && \
                        chmod +x /usr/local/bin/claudable-entrypoint.sh
                - 'ENTRYPOINT ["/bin/sh", "/usr/local/bin/claudable-entrypoint.sh"]'
caproverOneClickApp:
    variables:
        - id: '$$cap_claudable_ref'
          label: 'Claudable git ref'
          defaultValue: '2634077b0eecbf5affd1a8a88fe9f5b5bafde514'
          description: 'Pinned branch, tag, or commit to build from opactorai/Claudable.'
          validRegex: '/^[A-Za-z0-9._\/-]+$/'
        - id: '$$cap_claude_code_version'
          label: 'Claude Code CLI version'
          defaultValue: '2.1.123'
          description: 'Pinned @anthropic-ai/claude-code package version installed in the app image.'
          validRegex: "/^([^\\s^\\/])+$/"
        - id: '$$cap_codex_cli_version'
          label: 'Codex CLI version'
          defaultValue: '0.125.0'
          description: 'Pinned @openai/codex package version installed in the app image.'
          validRegex: "/^([^\\s^\\/])+$/"
        - id: '$$cap_qwen_code_version'
          label: 'Qwen Code CLI version'
          defaultValue: '0.15.5'
          description: 'Pinned @qwen-code/qwen-code package version installed in the app image.'
          validRegex: "/^([^\\s^\\/])+$/"
        - id: '$$cap_encryption_key'
          label: 'Encryption key'
          defaultValue: '$$cap_gen_random_hex(64)'
          description: 'Persistent 64-character hex key used by Claudable to encrypt saved project environment variables.'
          validRegex: '/^[a-fA-F0-9]{64}$/'
        - id: '$$cap_preview_port_start'
          label: 'Preview port range start'
          defaultValue: '3100'
          description: 'First internal port Claudable may use for generated project preview servers.'
          validRegex: '/^\d+$/'
        - id: '$$cap_preview_port_end'
          label: 'Preview port range end'
          defaultValue: '3199'
          description: 'Last internal port Claudable may use for generated project preview servers.'
          validRegex: '/^\d+$/'
        - id: '$$cap_anthropic_api_key'
          label: 'Anthropic API key'
          defaultValue: ''
          description: 'Optional. Leave blank if you plan to authenticate Claude Code interactively inside the container.'
        - id: '$$cap_openai_api_key'
          label: 'OpenAI API key'
          defaultValue: ''
          description: 'Optional. Used by Codex CLI when token-based login is not configured.'
        - id: '$$cap_qwen_api_key'
          label: 'Qwen API key'
          defaultValue: ''
          description: 'Optional. Used by Qwen Code when configured for API-key auth.'
        - id: '$$cap_zhipu_api_key'
          label: 'Zhipu API key'
          defaultValue: ''
          description: 'Optional. Used by Claudable GLM mode.'
        - id: '$$cap_github_token'
          label: 'GitHub token'
          defaultValue: ''
          description: 'Optional. You can also add GitHub, Supabase, and Vercel tokens later in the Claudable UI.'
    instructions:
        start: "Claudable will be built from the pinned upstream git ref and deployed as one CapRover web app.\n\nThis app stores SQLite data, generated projects, uploaded assets, npm cache, and CLI login state under the persistent /data volume. The container runs the web process as a non-root claudable user so the bundled agent CLIs can operate normally.\n\nThe image includes Claude Code CLI, Codex CLI, and Qwen Code CLI. Cursor CLI is not bundled because the upstream Linux installer is not packaged as a stable npm binary."
        end: "Claudable has been deployed.\n\nNext steps:\n1. Enable HTTPS for $$cap_appname in CapRover.\n2. Open https://$$cap_appname.$$cap_root_domain\n3. Add service tokens in Claudable Settings for GitHub, Supabase, and Vercel as needed.\n4. If you did not provide API keys, exec into the app container and run the relevant CLI login command with HOME=/data/home.\n\nKnown CapRover limitation: Claudable upstream currently reports generated project previews as localhost URLs. The main app deploys cleanly, but public iframe previews need either an upstream preview-proxy change or an operator-side tunnel/proxy for the internal preview port range."
    displayName: 'Claudable'
    isOfficial: false
    description: 'Open-source AI web app builder packaged for CapRover with persistent SQLite, projects, uploads, and bundled agent CLIs.'
    documentation: 'https://github.com/opactorai/Claudable'
