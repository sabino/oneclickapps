  instructions:
    start: "Deploys the current full Supabase self-host Docker stack on CapRover using baked-in upstream config assets. Most fields already have safe defaults; in the common case you only need the app name and can leave the advanced overrides alone.\n\nIf deployment fails with `No NodeId was found` or Docker logs mention `could not find an available IP while allocating VIP`, your shared CapRover swarm overlay is out of addresses. Remove unused services or follow the `/24 -> /20` migration guide in this repo before retrying."
    end: "Supabase is deployed behind Kong at https://$$cap_appname.$$cap_root_domain by default. Studio, Auth, REST, Storage, Realtime, Functions, Postgres, Supavisor, and Analytics are included. Review the generated secrets, set a custom domain if needed, and test Studio plus the core APIs after deploy.\n\nSupavisor publishes the two host ports you selected for direct external pooler access. When installing more than one Supabase stack on the same host, these ports must be unique per install.\n\nAfter deploy, enable HTTPS/TLS on the `$$cap_appname` service in CapRover. Kong is the public Supabase gateway and should be the service behind your domain and certificate."
  displayName: "Supabase"
  isOfficial: true
  description: "Full self-hosted Supabase stack for CapRover, updated to the current Docker-based deployment layout."
  documentation: "https://supabase.com/docs/guides/self-hosting/docker"
