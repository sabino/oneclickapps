      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: "160k"
      KONG_NGINX_PROXY_PROXY_BUFFERS: "64 160k"
      KONG_PROXY_ACCESS_LOG: "/dev/stdout combined"
      JWT_SECRET: "$$cap_jwt_secret"
      SUPABASE_ANON_KEY: "$$cap_anon_key"
      SUPABASE_SERVICE_KEY: "$$cap_service_role_key"
      SUPABASE_PUBLISHABLE_KEY: "$$cap_publishable_key"
      SUPABASE_SECRET_KEY: "$$cap_secret_key"
      ANON_KEY_ASYMMETRIC: "$$cap_anon_key_asymmetric"
      SERVICE_ROLE_KEY_ASYMMETRIC: "$$cap_service_role_key_asymmetric"
      DASHBOARD_USERNAME: "$$cap_dashboard_username"
      DASHBOARD_PASSWORD: "$$cap_dashboard_password"
    depends_on:
      - "$$cap_appname-studio"
    caproverExtra:
      containerHttpPort: "8000"
      websocketSupport: "true"
      dockerfileLines:
        - "FROM kong:$$cap_kong_version"
        - |-
          RUN mkdir -p /tmp && \
              printf '%b' '#!/bin/sh\nset -eu\n\nbase64url_encode() {\n  openssl base64 -A | tr '"'"'+/'"'"' '"'"'-_'"'"' | tr -d '"'"'='"'"'\n}\n\nsign_supabase_hs256_jwt() {\n  role="$1"\n  now="$(date +%s)"\n  exp="$((now + 60 * 60 * 24 * 365 * 5))"\n  header='"'"'{"alg":"HS256","typ":"JWT"}'"'"'\n  payload="$(printf '"'"'{"role":"%s","iss":"supabase-self-hosted","iat":%s,"exp":%s}'"'"' "$role" "$now" "$exp")"\n\n  header_b64="$(printf '"'"'%s'"'"' "$header" | base64url_encode)"\n  payload_b64="$(printf '"'"'%s'"'"' "$payload" | base64url_encode)"\n  signing_input="${header_b64}.${payload_b64}"\n  signature="$(\n    printf '"'"'%s'"'"' "$signing_input" |\n      openssl dgst -sha256 -hmac "$JWT_SECRET" -binary |\n      base64url_encode\n  )"\n\n  printf '"'"'%s.%s.%s'"'"' "$header_b64" "$payload_b64" "$signature"\n}\n\nensure_supabase_legacy_keys() {\n  : "${JWT_SECRET:?JWT_SECRET is required}"\n\n  if [ -z "${SUPABASE_ANON_KEY:-}" ]; then\n    export SUPABASE_ANON_KEY="$(sign_supabase_hs256_jwt anon)"\n  fi\n\n  if [ -z "${SUPABASE_SERVICE_KEY:-}" ]; then\n    export SUPABASE_SERVICE_KEY="$(sign_supabase_hs256_jwt service_role)"\n  fi\n\n  if [ -z "${ANON_KEY:-}" ]; then\n    export ANON_KEY="$SUPABASE_ANON_KEY"\n  fi\n\n  if [ -z "${SERVICE_KEY:-}" ]; then\n    export SERVICE_KEY="$SUPABASE_SERVICE_KEY"\n  fi\n\n  if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then\n    export SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_KEY"\n  fi\n\n  if [ -z "${SUPABASE_PUBLISHABLE_KEYS:-}" ]; then\n    export SUPABASE_PUBLISHABLE_KEYS="$(printf '"'"'{"default":"%s"}'"'"' "$SUPABASE_ANON_KEY")"\n  fi\n\n  if [ -z "${SUPABASE_SECRET_KEYS:-}" ]; then\n    export SUPABASE_SECRET_KEYS="$(printf '"'"'{"default":"%s"}'"'"' "$SUPABASE_SERVICE_KEY")"\n  fi\n}\n' > /tmp/legacy-keys.sh && \
              chmod +x /tmp/legacy-keys.sh
        - |-
          RUN mkdir -p /tmp && \
              printf '%b' '_format_version: '"'"'2.1'"'"'\n_transform: true\n\n###\n### Consumers / Users\n###\nconsumers:\n  - username: DASHBOARD\n  - username: anon\n    keyauth_credentials:\n      - key: $SUPABASE_ANON_KEY\n      - key: $SUPABASE_PUBLISHABLE_KEY\n  - username: service_role\n    keyauth_credentials:\n      - key: $SUPABASE_SERVICE_KEY\n      - key: $SUPABASE_SECRET_KEY\n\n###\n### Access Control List\n###\nacls:\n  - consumer: anon\n    group: anon\n  - consumer: service_role\n    group: admin\n\n###\n### Dashboard credentials\n###\nbasicauth_credentials:\n  - consumer: DASHBOARD\n    username: '"'"'$DASHBOARD_USERNAME'"'"'\n    password: '"'"'$DASHBOARD_PASSWORD'"'"'\n\n###\n### API Routes\n###\nservices:\n  ## Open Auth routes\n  - name: auth-v1-open\n    _comment: '"'"'Auth: /auth/v1/verify* -> http://srv-captain--$$cap_appname-auth:9999/verify*'"'"'\n    url: http://srv-captain--$$cap_appname-auth:9999/verify\n    routes:\n      - name: auth-v1-open\n        strip_path: true\n        paths:\n          - /auth/v1/verify\n    plugins:\n      - name: cors\n  - name: auth-v1-open-callback\n    _comment: '"'"'Auth: /auth/v1/callback* -> http://srv-captain--$$cap_appname-auth:9999/callback*'"'"'\n    url: http://srv-captain--$$cap_appname-auth:9999/callback\n    routes:\n      - name: auth-v1-open-callback\n        strip_path: true\n        paths:\n          - /auth/v1/callback\n    plugins:\n      - name: cors\n  - name: auth-v1-open-authorize\n    _comment: '"'"'Auth: /auth/v1/authorize* -> http://srv-captain--$$cap_appname-auth:9999/authorize*'"'"'\n    url: http://srv-captain--$$cap_appname-auth:9999/authorize\n    routes:\n      - name: auth-v1-open-authorize\n        strip_path: true\n        paths:\n          - /auth/v1/authorize\n    plugins:\n      - name: cors\n  - name: auth-v1-open-jwks\n    _comment: '"'"'Auth: /auth/v1/.well-known/jwks.json -> http://srv-captain--$$cap_appname-auth:9999/.well-known/jwks.json'"'"'\n    url: http://srv-captain--$$cap_appname-auth:9999/.well-known/jwks.json\n    routes:\n      - name: auth-v1-open-jwks\n        strip_path: true\n        paths:\n          - /auth/v1/.well-known/jwks.json\n    plugins:\n      - name: cors\n\n  ## Secure Auth routes\n  - name: auth-v1\n    _comment: '"'"'Auth: /auth/v1/* -> http://srv-captain--$$cap_appname-auth:9999/*'"'"'\n    url: http://srv-captain--$$cap_appname-auth:9999/\n    routes:\n      - name: auth-v1-all\n        strip_path: true\n        paths:\n          - /auth/v1/\n    plugins:\n      - name: cors\n      - name: key-auth\n        config:\n          hide_credentials: false\n      - name: request-transformer\n        config:\n          add:\n            headers:\n              - "Authorization: $LUA_AUTH_EXPR"\n          replace:\n            headers:\n              - "Authorization: $LUA_AUTH_EXPR"\n      - name: acl\n        config:\n          hide_groups_header: true\n          allow:\n            - admin\n            - anon\n\n  ## Secure PostgREST routes\n  - name: rest-v1\n    _comment: '"'"'PostgREST: /rest/v1/* -> http://srv-captain--$$cap_appname-rest:3000/*'"'"'\n    url: http://srv-captain--$$cap_appname-rest:3000/\n    routes:\n      - name: rest-v1-all\n        strip_path: true\n        paths:\n          - /rest/v1/\n    plugins:\n      - name: cors\n      - name: key-auth\n        config:\n          hide_credentials: false\n      - name: request-transformer\n        config:\n          add:\n            headers:\n              - "Authorization: $LUA_AUTH_EXPR"\n          replace:\n            headers:\n              - "Authorization: $LUA_AUTH_EXPR"\n      - name: acl\n        config:\n          hide_groups_header: true\n          allow:\n            - admin\n            - anon\n\n  ## Secure GraphQL routes\n  - name: graphql-v1\n    _comment: '"'"'PostgREST: /graphql/v1/* -> http://srv-captain--$$cap_appname-rest:3000/rpc/graphql'"'"'\n    url: http://srv-captain--$$cap_appname-rest:3000/rpc/graphql\n    routes:\n      - name: graphql-v1-all\n        strip_path: true\n        paths:\n          - /graphql/v1\n    plugins:\n      - name: cors\n      - name: key-auth\n        config:\n          hide_credentials: false\n      - name: request-transformer\n        config:\n          add:\n            headers:\n              - "Content-Profile: graphql_public"\n              - "Authorization: $LUA_AUTH_EXPR"\n          replace:\n            headers:\n              - "Authorization: $LUA_AUTH_EXPR"\n      - name: acl\n        config:\n          hide_groups_header: true\n          allow:\n            - admin\n            - anon\n\n  ## Secure Realtime routes\n  - name: realtime-v1-ws\n    _comment: '"'"'Realtime: /realtime/v1/* -> ws://realtime:4000/socket/*'"'"'\n    url: http://srv-captain--$$cap_appname-realtime:4000/socket\n    protocol: ws\n    routes:\n      - name: realtime-v1-ws\n        strip_path: true\n        paths:\n          - /realtime/v1/\n    plugins:\n      - name: cors\n      - name: key-auth\n        config:\n          hide_credentials: false\n      - name: request-transformer\n        config:\n          add:\n            headers:\n              - "x-api-key:$LUA_RT_WS_EXPR"\n          replace:\n            querystring:\n              - "apikey:$LUA_RT_WS_EXPR"\n      - name: acl\n        config:\n          hide_groups_header: true\n          allow:\n            - admin\n            - anon\n\n  - name: realtime-v1-rest\n    _comment: '"'"'Realtime: /realtime/v1/api/* -> http://realtime:4000/api/*'"'"'\n    url: http://srv-captain--$$cap_appname-realtime:4000/api\n    protocol: http\n    routes:\n      - name: realtime-v1-rest\n        strip_path: true\n        paths:\n          - /realtime/v1/api\n    plugins:\n      - name: cors\n      - name: key-auth\n        config:\n          hide_credentials: false\n      - name: request-transformer\n        config:\n          add:\n            headers:\n              - "Authorization: $LUA_AUTH_EXPR"\n          replace:\n            headers:\n              - "Authorization: $LUA_AUTH_EXPR"\n      - name: acl\n        config:\n          hide_groups_header: true\n          allow:\n            - admin\n            - anon\n\n  ## Storage API endpoint (with Authorization header transformation).\n  ## No key-auth — S3 protocol requests don'"'"'t carry an apikey header.\n  ##\n  ## The request-transformer translates opaque API keys to asymmetric JWTs\n  ## and passes through existing Authorization headers (user JWTs, AWS SigV4).\n  ## When no Authorization or apikey header is present (S3 presigned URLs),\n  ## the Lua expression evaluates to nil which Kong renders as empty string.\n  ## The post-function strips this empty header so Storage'"'"'s S3 signature\n  ## verification falls through to query-parameter parsing.\n  - name: storage-v1\n    _comment: '"'"'Storage: /storage/v1/* -> http://srv-captain--$$cap_appname-storage:5000/*'"'"'\n    url: http://srv-captain--$$cap_appname-storage:5000/\n    routes:\n      - name: storage-v1-all\n        strip_path: true\n        paths:\n          - /storage/v1/\n    plugins:\n      - name: cors\n      - name: request-transformer\n        config:\n          add:\n            headers:\n              - "Authorization: $LUA_AUTH_EXPR"\n          replace:\n            headers:\n              - "Authorization: $LUA_AUTH_EXPR"\n      - name: post-function\n        config:\n          access:\n            - |\n              local auth = kong.request.get_header("authorization")\n              if auth == nil or auth == "" or auth:find("^%s*$") then\n                kong.service.request.clear_header("authorization")\n              end\n\n  ## Edge Functions routes\n  - name: functions-v1\n    _comment: '"'"'Edge Functions: /functions/v1/* -> http://srv-captain--$$cap_appname-functions:9000/*'"'"'\n    url: http://srv-captain--$$cap_appname-functions:9000/\n    read_timeout: 150000\n    routes:\n      - name: functions-v1-all\n        strip_path: true\n        paths:\n          - /functions/v1/\n    plugins:\n      - name: cors\n\n  ## OAuth 2.0 Authorization Server Metadata (RFC 8414)\n  - name: well-known-oauth\n    _comment: '"'"'Auth: /.well-known/oauth-authorization-server -> http://srv-captain--$$cap_appname-auth:9999/.well-known/oauth-authorization-server'"'"'\n    url: http://srv-captain--$$cap_appname-auth:9999/.well-known/oauth-authorization-server\n    routes:\n      - name: well-known-oauth\n        strip_path: true\n        paths:\n          - /.well-known/oauth-authorization-server\n    plugins:\n      - name: cors\n\n  ## Analytics routes\n  ## Not used - Studio and Vector talk directly to analytics via Docker networking.\n  ## If external access is needed, add routes with key-auth matching Logflare'"'"'s x-api-key auth.\n  # - name: analytics-v1-api\n  #   _comment: '"'"'Analytics: /analytics/v1/api/endpoints/* -> http://logflare:4000/api/endpoints/*'"'"'\n  #   url: http://srv-captain--$$cap_appname-analytics:4000/api/endpoints\n  #   routes:\n  #     - name: analytics-v1-api\n  #       strip_path: true\n  #       paths:\n  #         - /analytics/v1/api/endpoints/\n  # - name: analytics-v1\n  #   _comment: '"'"'Analytics: /analytics/v1/* -> http://logflare:4000/*'"'"'\n  #   url: http://srv-captain--$$cap_appname-analytics:4000/\n  #   routes:\n  #     - name: dashboard-v1-all\n  #       strip_path: true\n  #       paths:\n  #         - /analytics/v1\n  #   plugins:\n  #     - name: cors\n  #     - name: basic-auth\n  #       config:\n  #         hide_credentials: true\n\n  ## Secure Database routes\n  - name: meta\n    _comment: '"'"'pg-meta: /pg/* -> http://pg-meta:8080/*'"'"'\n    url: http://srv-captain--$$cap_appname-meta:8080/\n    routes:\n      - name: meta-all\n        strip_path: true\n        paths:\n          - /pg/\n    plugins:\n      - name: key-auth\n        config:\n          hide_credentials: false\n      - name: acl\n        config:\n          hide_groups_header: true\n          allow:\n            - admin\n\n  ## Block access to /api/mcp\n  - name: mcp-blocker\n    _comment: '"'"'Block direct access to /api/mcp'"'"'\n    url: http://srv-captain--$$cap_appname-studio:3000/api/mcp\n    routes:\n      - name: mcp-blocker-route\n        strip_path: true\n        paths:\n          - /api/mcp\n    plugins:\n      - name: request-termination\n        config:\n          status_code: 403\n          message: "Access is forbidden."\n\n  ## MCP endpoint - local access\n  - name: mcp\n    _comment: '"'"'MCP: /mcp -> http://srv-captain--$$cap_appname-studio:3000/api/mcp (local access)'"'"'\n    url: http://srv-captain--$$cap_appname-studio:3000/api/mcp\n    routes:\n      - name: mcp\n        strip_path: true\n        paths:\n          - /mcp\n    plugins:\n      # Block access to /mcp by default\n      - name: request-termination\n        config:\n          status_code: 403\n          message: "Access is forbidden."\n      # Enable local access (danger zone!)\n      # 1. Comment out the '"'"'request-termination'"'"' section above\n      # 2. Uncomment the entire section below, including '"'"'deny'"'"'\n      # 3. Add your local IPs to the '"'"'allow'"'"' list\n      #- name: cors\n      #- name: ip-restriction\n      #  config:\n      #    allow:\n      #      - 127.0.0.1\n      #      - ::1\n      #    deny: []\n\n  ## Protected Dashboard - catch all remaining routes\n  - name: dashboard\n    _comment: '"'"'Studio: /* -> http://srv-captain--$$cap_appname-studio:3000/*'"'"'\n    url: http://srv-captain--$$cap_appname-studio:3000/\n    routes:\n      - name: dashboard-all\n        strip_path: true\n        paths:\n          - /\n    plugins:\n      - name: cors\n      - name: basic-auth\n        config:\n          hide_credentials: true\n' > /tmp/kong-template.yml
        - |-
          RUN mkdir -p /tmp && \
              printf '%b' '#!/bin/sh\nset -eu\n\n. /tmp/legacy-keys.sh\nensure_supabase_legacy_keys\n\n# Custom entrypoint for Kong that builds Lua expressions for request-transformer\n# and performs environment variable substitution in the declarative config.\n\n# Build Lua expressions for translating opaque API keys to asymmetric JWTs.\n# When opaque keys are not configured (empty env vars), expressions fall through\n# to legacy-only behavior - just passing apikey as-is.\n#\n# Full expression logic (when opaque keys are configured):\n#   1. If Authorization header exists and is NOT an sb_ key -> pass through (user session JWT)\n#   2. If apikey matches secret key -> set service_role asymmetric JWT internal "API key"\n#   3. If apikey matches publishable key -> set anon asymmetric JWT internal "API key"\n#   4. Fallback: pass apikey as-is (legacy HS256 JWT)\n\nif [ -n "$SUPABASE_SECRET_KEY" ] && [ -n "$SUPABASE_PUBLISHABLE_KEY" ]; then\n    # Opaque keys configured -> full translation expressions\n    export LUA_AUTH_EXPR="\\$((headers.authorization ~= nil and headers.authorization:sub(1, 10) ~= '"'"'Bearer sb_'"'"' and headers.authorization) or (headers.apikey == '"'"'$SUPABASE_SECRET_KEY'"'"' and '"'"'Bearer $SERVICE_ROLE_KEY_ASYMMETRIC'"'"') or (headers.apikey == '"'"'$SUPABASE_PUBLISHABLE_KEY'"'"' and '"'"'Bearer $ANON_KEY_ASYMMETRIC'"'"') or headers.apikey)"\n\n    # Realtime WebSocket: reads from query_params.apikey (supabase-js sends apikey\n    # via query string), outputs to x-api-key header which Realtime checks first.\n    export LUA_RT_WS_EXPR="\\$((query_params.apikey == '"'"'$SUPABASE_SECRET_KEY'"'"' and '"'"'$SERVICE_ROLE_KEY_ASYMMETRIC'"'"') or (query_params.apikey == '"'"'$SUPABASE_PUBLISHABLE_KEY'"'"' and '"'"'$ANON_KEY_ASYMMETRIC'"'"') or query_params.apikey)"\nelse\n    # Legacy API keys, not sb_ API keys -> pass apikey through unchanged\n    export LUA_AUTH_EXPR="\\$((headers.authorization ~= nil and headers.authorization:sub(1, 10) ~= '"'"'Bearer sb_'"'"' and headers.authorization) or headers.apikey)"\n    export LUA_RT_WS_EXPR="\\$(query_params.apikey)"\nfi\n\n# Substitute environment variables in the Kong declarative config.\n# Uses awk instead of eval/echo to preserve YAML quoting (eval strips double\n# quotes, breaking "Header: value" patterns that YAML parses as mappings).\nawk '"'"'{\n  result = ""\n  rest = $0\n  while (match(rest, /\\$[A-Za-z_][A-Za-z_0-9]*/)) {\n    varname = substr(rest, RSTART + 1, RLENGTH - 1)\n    if (varname in ENVIRON) {\n      result = result substr(rest, 1, RSTART - 1) ENVIRON[varname]\n    } else {\n      result = result substr(rest, 1, RSTART + RLENGTH - 1)\n    }\n    rest = substr(rest, RSTART + RLENGTH)\n  }\n  print result rest\n}'"'"' /tmp/kong-template.yml > "$KONG_DECLARATIVE_CONFIG"\n\n# Remove empty key-auth credentials (unconfigured opaque keys)\nsed -i '"'"'/^[[:space:]]*- key:[[:space:]]*$/d'"'"' "$KONG_DECLARATIVE_CONFIG"\n\nexec /docker-entrypoint.sh kong docker-start\n' > /tmp/kong-entrypoint.sh && \
              chmod +x /tmp/kong-entrypoint.sh
        - 'ENTRYPOINT ["/bin/sh", "/tmp/kong-entrypoint.sh"]'
