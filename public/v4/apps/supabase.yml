      validRegex: "/^.{32}$/"
    - id: "$$cap_pg_meta_crypto_key"
      label: "PG_META_CRYPTO_KEY"
      defaultValue: "$$cap_gen_random_hex(48)"
      validRegex: "/.{32,}/"
    - id: "$$cap_logflare_public_access_token"
      label: "LOGFLARE_PUBLIC_ACCESS_TOKEN"
      defaultValue: "$$cap_gen_random_hex(48)"
      validRegex: "/.{32,}/"
    - id: "$$cap_logflare_private_access_token"
      label: "LOGFLARE_PRIVATE_ACCESS_TOKEN"
      defaultValue: "$$cap_gen_random_hex(48)"
      validRegex: "/.{32,}/"
    - id: "$$cap_s3_protocol_access_key_id"
      label: "S3 protocol access key id"
      defaultValue: "$$cap_gen_random_hex(32)"
      validRegex: "/.{1,}/"
    - id: "$$cap_s3_protocol_access_key_secret"
      label: "S3 protocol access key secret"
      defaultValue: "$$cap_gen_random_hex(64)"
      validRegex: "/.{1,}/"
    - id: "$$cap_pooler_tenant_id"
