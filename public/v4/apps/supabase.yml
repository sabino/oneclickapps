# This file is generated by scripts/generate_supabase.js.
# Do not edit public/v4/apps/supabase.yml by hand; update the generator or
# files under scripts/supabase-assets/ and then run `npm run generate_supabase`.
captainVersion: 4
services:
  $$cap_appname-studio:
    restart: "unless-stopped"
    depends_on:
      - "$$cap_appname-meta"
    volumes:
      - "$$cap_appname-studio-snippets:/app/snippets"
      - "$$cap_appname-functions-data:/app/edge-functions"
    environment:
      HOSTNAME: "::"
      STUDIO_PG_META_URL: "http://srv-captain--$$cap_appname-meta:8080"
      POSTGRES_PORT: "5432"
      POSTGRES_HOST: "srv-captain--$$cap_appname-db"
      POSTGRES_DB: "$$cap_postgres_db"
      POSTGRES_PASSWORD: "$$cap_postgres_password"
      PG_META_CRYPTO_KEY: "$$cap_pg_meta_crypto_key"
      PGRST_DB_SCHEMAS: "$$cap_pgrst_db_schemas"
      PGRST_DB_MAX_ROWS: "$$cap_pgrst_db_max_rows"
      PGRST_DB_EXTRA_SEARCH_PATH: "$$cap_pgrst_db_extra_search_path"
      DEFAULT_ORGANIZATION_NAME: "$$cap_studio_default_organization"
      DEFAULT_PROJECT_NAME: "$$cap_studio_default_project"
      OPENAI_API_KEY: "$$cap_openai_api_key"
      OPENAI_BASE_URL: "$$cap_openai_base_url"
      OPENAI_API_VERSION: "$$cap_openai_api_version"
      OPENAI_MODEL: "$$cap_openai_model"
      OPENAI_ADVANCE_MODEL: "$$cap_openai_advance_model"
      AZURE_OPENAI_USE_API_KEY_HEADER: "$$cap_azure_openai_use_api_key_header"
      JWT_SECRET: "$$cap_jwt_secret"
      SUPABASE_URL: "http://srv-captain--$$cap_appname:8000"
      SUPABASE_PUBLIC_URL: "$$cap_public_url"
      SUPABASE_ANON_KEY: "$$cap_anon_key"
      SUPABASE_SERVICE_KEY: "$$cap_service_role_key"
      AUTH_JWT_SECRET: "$$cap_jwt_secret"
      SNIPPETS_MANAGEMENT_FOLDER: "/app/snippets"
      EDGE_FUNCTIONS_MANAGEMENT_FOLDER: "/app/edge-functions"
      NEXT_PUBLIC_ENABLE_LOGS: "false"
      LOGFLARE_URL: "http://srv-captain--$$cap_appname-analytics:4000"
      LOGFLARE_PRIVATE_ACCESS_TOKEN: "$$cap_logflare_private_access_token"
    caproverExtra:
      notExposeAsWebApp: "true"
      dockerfileLines:
        - "FROM supabase/studio:$$cap_studio_version"
        - |-
          RUN mkdir -p /usr/local/bin && \
              printf '%b' '#!/bin/sh\nset -eu\n\nbase64url_encode() {\n  openssl base64 -A | tr '"'"'+/'"'"' '"'"'-_'"'"' | tr -d '"'"'='"'"'\n}\n\nsign_supabase_hs256_jwt() {\n  role="$1"\n  now="$(date +%s)"\n  exp="$((now + 60 * 60 * 24 * 365 * 5))"\n  header='"'"'{"alg":"HS256","typ":"JWT"}'"'"'\n  payload="$(printf '"'"'{"role":"%s","iss":"supabase-self-hosted","iat":%s,"exp":%s}'"'"' "$role" "$now" "$exp")"\n\n  header_b64="$(printf '"'"'%s'"'"' "$header" | base64url_encode)"\n  payload_b64="$(printf '"'"'%s'"'"' "$payload" | base64url_encode)"\n  signing_input="${header_b64}.${payload_b64}"\n  signature="$(\n    printf '"'"'%s'"'"' "$signing_input" |\n      openssl dgst -sha256 -hmac "$JWT_SECRET" -binary |\n      base64url_encode\n  )"\n\n  printf '"'"'%s.%s.%s'"'"' "$header_b64" "$payload_b64" "$signature"\n}\n\nensure_supabase_legacy_keys() {\n  : "${JWT_SECRET:?JWT_SECRET is required}"\n\n  if [ -z "${SUPABASE_ANON_KEY:-}" ]; then\n    export SUPABASE_ANON_KEY="$(sign_supabase_hs256_jwt anon)"\n  fi\n\n  if [ -z "${SUPABASE_SERVICE_KEY:-}" ]; then\n    export SUPABASE_SERVICE_KEY="$(sign_supabase_hs256_jwt service_role)"\n  fi\n\n  if [ -z "${ANON_KEY:-}" ]; then\n    export ANON_KEY="$SUPABASE_ANON_KEY"\n  fi\n\n  if [ -z "${SERVICE_KEY:-}" ]; then\n    export SERVICE_KEY="$SUPABASE_SERVICE_KEY"\n  fi\n\n  if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then\n    export SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_KEY"\n  fi\n\n  if [ -z "${SUPABASE_PUBLISHABLE_KEYS:-}" ]; then\n    export SUPABASE_PUBLISHABLE_KEYS="$(printf '"'"'{"default":"%s"}'"'"' "$SUPABASE_ANON_KEY")"\n  fi\n\n  if [ -z "${SUPABASE_SECRET_KEYS:-}" ]; then\n    export SUPABASE_SECRET_KEYS="$(printf '"'"'{"default":"%s"}'"'"' "$SUPABASE_SERVICE_KEY")"\n  fi\n}\n' > /usr/local/bin/legacy-keys.sh && \
              chmod +x /usr/local/bin/legacy-keys.sh
        - |-
          RUN mkdir -p /usr/local/bin && \
              printf '%b' '#!/bin/sh\nset -eu\n\nROOT="/app/apps/studio/.next/server"\n\nif [ ! -d "$ROOT" ]; then\n  exit 0\nfi\n\n# The published supabase/studio image ships prebuilt Next server chunks. We patch\n# those chunks in-place so one-click users can supply OpenAI-compatible endpoints\n# such as Azure OpenAI without maintaining a long-lived upstream fork.\npython3 - <<'"'"'PY'"'"'\nimport glob\nimport os\nimport re\n\nroot = "/app/apps/studio/.next/server"\nfiles = [path for path in glob.glob(root + "/**/*.js", recursive=True) if os.path.isfile(path)]\n\nreplacements = [\n    (\n        '"'"'openai:{models:{"gpt-5":{default:!1},"gpt-5-mini":{default:!0}},providerOptions:{openai:{reasoningEffort:"minimal"}}}'"'"',\n        '"'"'openai:{models:{[process.env.OPENAI_ADVANCE_MODEL||"gpt-5"]:{default:!1},[process.env.OPENAI_MODEL||"gpt-5-mini"]:{default:!0}},providerOptions:{openai:{reasoningEffort:"minimal"}}}'"'"',\n    ),\n    (\n        '"'"'openai:{models:{"gpt-5.3-codex":{default:!1},"gpt-5.4-nano":{default:!0}},providerOptions:{openai:{store:!1}}}'"'"',\n        '"'"'openai:{models:{[process.env.OPENAI_ADVANCE_MODEL||"gpt-5.3-codex"]:{default:!1},[process.env.OPENAI_MODEL||"gpt-5.4-nano"]:{default:!0}},providerOptions:{openai:{store:!1}}}'"'"',\n    ),\n]\n\nopenai_provider_pattern = re.compile(\n    r'"'"'model:\\(0,([A-Za-z_$][\\w$]*)\\.openai\\)\\(([^)]+)\\)'"'"'\n)\n\ndirect_openai_client_pattern = re.compile(\n    r'"'"'new ([A-Za-z_$][\\w$]*)(\\.default)?\\(\\{apiKey:([A-Za-z_$][\\w$]*)\\}\\)'"'"'\n)\n\npatched_files = 0\n\ndef replace_openai_provider(match: re.Match[str]) -> str:\n    module_name = match.group(1)\n    model_var = match.group(2)\n    provider_factory = (\n        f'"'"'((process.env.OPENAI_BASE_URL||process.env.AZURE_OPENAI_BASE_URL)&&{module_name}.createOpenAI'"'"'\n        f'"'"'?{module_name}.createOpenAI({{'"'"'\n        f'"'"'baseURL:process.env.OPENAI_BASE_URL||process.env.AZURE_OPENAI_BASE_URL,'"'"'\n        f'"'"'apiKey:process.env.OPENAI_API_KEY,'"'"'\n        f'"'"'headers:"true"===process.env.AZURE_OPENAI_USE_API_KEY_HEADER?{{"api-key":process.env.OPENAI_API_KEY}}:{{}}'"'"'\n        f'"'"'}})'"'"'\n        f'"'"':{module_name}.openai)'"'"'\n    )\n    return f'"'"'model:({provider_factory})({model_var})'"'"'\n\nfor path in files:\n    with open(path, "r", encoding="utf-8") as handle:\n        original = handle.read()\n\n    updated = original\n\n    for needle, replacement in replacements:\n        updated = updated.replace(needle, replacement)\n\n    updated = openai_provider_pattern.sub(replace_openai_provider, updated)\n\n    def replace_openai_client(match: re.Match[str]) -> str:\n        client_name = match.group(1)\n        client_suffix = match.group(2) or ""\n        api_key_var = match.group(3)\n        return (\n            f'"'"'new {client_name}{client_suffix}('"'"'\n            f'"'"'{{apiKey:{api_key_var},'"'"'\n            f'"'"'baseURL:process.env.OPENAI_BASE_URL||process.env.AZURE_OPENAI_BASE_URL||void 0,'"'"'\n            f'"'"'defaultQuery:process.env.OPENAI_API_VERSION?{{"api-version":process.env.OPENAI_API_VERSION}}:void 0,'"'"'\n            f'"'"'defaultHeaders:"true"===process.env.AZURE_OPENAI_USE_API_KEY_HEADER?{{"api-key":{api_key_var}}}:void 0}}'"'"'\n            f'"'"')'"'"'\n        )\n\n    updated = direct_openai_client_pattern.sub(replace_openai_client, updated)\n\n    if updated != original:\n        with open(path, "w", encoding="utf-8") as handle:\n            handle.write(updated)\n        patched_files += 1\n\nprint(f"patch-studio-ai: patched {patched_files} file(s)")\nPY\n' > /usr/local/bin/patch-studio-ai.sh && \
              chmod +x /usr/local/bin/patch-studio-ai.sh
        - |-
          RUN mkdir -p /usr/local/bin && \
              printf '%b' '#!/bin/sh\nset -eu\n\n. /usr/local/bin/legacy-keys.sh\nensure_supabase_legacy_keys\n\n/usr/local/bin/patch-studio-ai.sh\n\nexec docker-entrypoint.sh "$@"\n' > /usr/local/bin/with-legacy-keys-and-ai-patch-docker-entrypoint.sh && \
              chmod +x /usr/local/bin/with-legacy-keys-and-ai-patch-docker-entrypoint.sh
        - 'ENTRYPOINT ["/bin/sh", "/usr/local/bin/with-legacy-keys-and-ai-patch-docker-entrypoint.sh"]'
        - 'CMD ["node", "apps/studio/server.js"]'
      serviceUpdateOverride:
        EndpointSpec:
          Mode: "dnsrr"
  $$cap_appname:
    restart: "unless-stopped"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: "/tmp/kong.yml"
      KONG_DNS_ORDER: "LAST,A,CNAME"
