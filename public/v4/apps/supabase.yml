  $$cap_appname-vector:
    restart: "unless-stopped"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    environment:
      LOGFLARE_PUBLIC_ACCESS_TOKEN: "$$cap_logflare_public_access_token"
    caproverExtra:
      notExposeAsWebApp: "true"
      dockerfileLines:
        - "FROM timberio/vector:$$cap_vector_version"
        - |-
          RUN mkdir -p /etc/vector && \
              printf '%b' 'api:\n  enabled: true\n  address: 0.0.0.0:9001\n\nsources:\n  docker_host:\n    type: docker_logs\n    exclude_containers:\n      - srv-captain--$$cap_appname-vector\n\ntransforms:\n  project_logs:\n    type: remap\n    inputs:\n      - docker_host\n    source: |-\n      .project = "$$cap_appname"\n      .event_message = del(.message)\n      .appname = del(.container_name)\n      del(.container_created_at)\n      del(.container_id)\n      del(.source_type)\n      del(.stream)\n      del(.label)\n      del(.image)\n      del(.host)\n      del(.stream)\n  router:\n    type: route\n    inputs:\n      - project_logs\n    route:\n      kong: '"'"'contains(string!(.appname), "srv-captain--$$cap_appname") && !contains(string!(.appname), "-analytics") && !contains(string!(.appname), "-auth") && !contains(string!(.appname), "-db") && !contains(string!(.appname), "-functions") && !contains(string!(.appname), "-meta") && !contains(string!(.appname), "-realtime") && !contains(string!(.appname), "-rest") && !contains(string!(.appname), "-storage") && !contains(string!(.appname), "-studio") && !contains(string!(.appname), "-supavisor") && !contains(string!(.appname), "-vector")'"'"'\n      auth: '"'"'contains(string!(.appname), "srv-captain--$$cap_appname-auth")'"'"'\n      rest: '"'"'contains(string!(.appname), "srv-captain--$$cap_appname-rest")'"'"'\n      realtime: '"'"'contains(string!(.appname), "srv-captain--$$cap_appname-realtime")'"'"'\n      storage: '"'"'contains(string!(.appname), "srv-captain--$$cap_appname-storage")'"'"'\n      functions: '"'"'contains(string!(.appname), "srv-captain--$$cap_appname-functions")'"'"'\n      db: '"'"'contains(string!(.appname), "srv-captain--$$cap_appname-db")'"'"'\n  # Ignores non nginx errors since they are related with kong booting up\n  kong_logs:\n    type: remap\n    inputs:\n      - router.kong\n    source: |-\n      req, err = parse_nginx_log(.event_message, "combined")\n      if err == null {\n          .timestamp = req.timestamp\n          .metadata.request.headers.referer = req.referer\n          .metadata.request.headers.user_agent = req.agent\n          .metadata.request.headers.cf_connecting_ip = req.client\n          .metadata.response.status_code = req.status\n          url, split_err = split(req.request, " ")\n          if split_err == null {\n              .metadata.request.method = url[0]\n              .metadata.request.path = url[1]\n              .metadata.request.protocol = url[2]\n          }\n      }\n      if err != null {\n        abort\n      }\n  # Ignores non nginx errors since they are related with kong booting up\n  kong_err:\n    type: remap\n    inputs:\n      - router.kong\n    source: |-\n      .metadata.request.method = "GET"\n      .metadata.response.status_code = 200\n      parsed, err = parse_nginx_log(.event_message, "error")\n      if err == null {\n          .timestamp = parsed.timestamp\n          .severity = parsed.severity\n          .metadata.request.host = parsed.host\n          .metadata.request.headers.cf_connecting_ip = parsed.client\n          url, err = split(parsed.request, " ")\n          if err == null {\n              .metadata.request.method = url[0]\n              .metadata.request.path = url[1]\n              .metadata.request.protocol = url[2]\n          }\n      }\n      if err != null {\n        abort\n      }\n  # Gotrue logs are structured json strings which frontend parses directly. But we keep metadata for consistency.\n  auth_logs:\n    type: remap\n    inputs:\n      - router.auth\n    source: |-\n      parsed, err = parse_json(.event_message)\n      if err == null {\n          .metadata.timestamp = parsed.time\n          .metadata = merge!(.metadata, parsed)\n      }\n  # PostgREST logs are structured so we separate timestamp from message using regex\n  rest_logs:\n    type: remap\n    inputs:\n      - router.rest\n    source: |-\n      parsed, err = parse_regex(.event_message, r'"'"'^(?P<time>.*): (?P<msg>.*)$'"'"')\n      if err == null {\n          .event_message = parsed.msg\n          .timestamp = parse_timestamp!(value: parsed.time,format: "%d/%b/%Y:%H:%M:%S %z")\n          .metadata.host = .project\n      }\n  # Filter out healthcheck logs from Realtime\n  realtime_logs_filtered:\n    type: filter\n    inputs:\n      - router.realtime\n    condition: '"'"'!contains(string!(.event_message), "/health")'"'"'\n  # Realtime logs are structured so we parse the severity level using regex (ignore time because it has no date)\n  realtime_logs:\n    type: remap\n    inputs:\n      - realtime_logs_filtered\n    source: |-\n      .metadata.project = del(.project)\n      .metadata.external_id = .metadata.project\n      parsed, err = parse_regex(.event_message, r'"'"'^(?P<time>\\d+:\\d+:\\d+\\.\\d+) \\[(?P<level>\\w+)\\] (?P<msg>.*)$'"'"')\n      if err == null {\n          .event_message = parsed.msg\n          .metadata.level = parsed.level\n      }\n  # Function logs are unstructured messages on stderr\n  functions_logs:\n    type: remap\n    inputs:\n      - router.functions\n    source: |-\n      .metadata.project_ref = del(.project)\n  # Storage logs may contain json objects so we parse them for completeness\n  storage_logs:\n    type: remap\n    inputs:\n      - router.storage\n    source: |-\n      .metadata.project = del(.project)\n      .metadata.tenantId = .metadata.project\n      parsed, err = parse_json(.event_message)\n      if err == null {\n          .event_message = parsed.msg\n          .metadata.level = parsed.level\n          .metadata.timestamp = parsed.time\n          .metadata.context[0].host = parsed.hostname\n          .metadata.context[0].pid = parsed.pid\n      }\n  # Postgres logs some messages to stderr which we map to warning severity level\n  db_logs:\n    type: remap\n    inputs:\n      - router.db\n    source: |-\n      .metadata.host = "db-default"\n      .metadata.parsed.timestamp = .timestamp\n\n      parsed, err = parse_regex(.event_message, r'"'"'.*(?P<level>INFO|NOTICE|WARNING|ERROR|LOG|FATAL|PANIC?):.*'"'"', numeric_groups: true)\n\n      if err != null || parsed == null {\n        .metadata.parsed.error_severity = "info"\n      }\n      if parsed.level != null {\n       .metadata.parsed.error_severity = parsed.level\n      }\n      if .metadata.parsed.error_severity == "info" {\n          .metadata.parsed.error_severity = "log"\n      }\n      .metadata.parsed.error_severity = upcase!(.metadata.parsed.error_severity)\n\nsinks:\n  logflare_auth:\n    type: '"'"'http'"'"'\n    inputs:\n      - auth_logs\n    encoding:\n      codec: '"'"'json'"'"'\n    method: '"'"'post'"'"'\n    request:\n      retry_max_duration_secs: 30\n      retry_initial_backoff_secs: 1\n      headers:\n        x-api-key: ${LOGFLARE_PUBLIC_ACCESS_TOKEN?LOGFLARE_PUBLIC_ACCESS_TOKEN is required}\n    uri: '"'"'http://analytics:4000/api/logs?source_name=gotrue.logs.prod'"'"'\n  logflare_realtime:\n    type: '"'"'http'"'"'\n    inputs:\n      - realtime_logs\n    encoding:\n      codec: '"'"'json'"'"'\n    method: '"'"'post'"'"'\n    request:\n      retry_max_duration_secs: 30\n      retry_initial_backoff_secs: 1\n      headers:\n        x-api-key: ${LOGFLARE_PUBLIC_ACCESS_TOKEN?LOGFLARE_PUBLIC_ACCESS_TOKEN is required}\n    uri: '"'"'http://analytics:4000/api/logs?source_name=realtime.logs.prod'"'"'\n  logflare_rest:\n    type: '"'"'http'"'"'\n    inputs:\n      - rest_logs\n    encoding:\n      codec: '"'"'json'"'"'\n    method: '"'"'post'"'"'\n    request:\n      retry_max_duration_secs: 30\n      retry_initial_backoff_secs: 1\n      headers:\n        x-api-key: ${LOGFLARE_PUBLIC_ACCESS_TOKEN?LOGFLARE_PUBLIC_ACCESS_TOKEN is required}\n    uri: '"'"'http://analytics:4000/api/logs?source_name=postgREST.logs.prod'"'"'\n  logflare_db:\n    type: '"'"'http'"'"'\n    inputs:\n      - db_logs\n    encoding:\n      codec: '"'"'json'"'"'\n    method: '"'"'post'"'"'\n    request:\n      retry_max_duration_secs: 30\n      retry_initial_backoff_secs: 1\n      headers:\n        x-api-key: ${LOGFLARE_PUBLIC_ACCESS_TOKEN?LOGFLARE_PUBLIC_ACCESS_TOKEN is required}\n    # Route directly to analytics like other sinks. Retry handles the startup\n    # race where analytics may not be ready yet when early DB logs arrive.\n    uri: '"'"'http://analytics:4000/api/logs?source_name=postgres.logs'"'"'\n  logflare_functions:\n    type: '"'"'http'"'"'\n    inputs:\n      - functions_logs\n    encoding:\n      codec: '"'"'json'"'"'\n    method: '"'"'post'"'"'\n    request:\n      retry_max_duration_secs: 30\n      retry_initial_backoff_secs: 1\n      headers:\n        x-api-key: ${LOGFLARE_PUBLIC_ACCESS_TOKEN?LOGFLARE_PUBLIC_ACCESS_TOKEN is required}\n    uri: '"'"'http://analytics:4000/api/logs?source_name=deno-relay-logs'"'"'\n  logflare_storage:\n    type: '"'"'http'"'"'\n    inputs:\n      - storage_logs\n    encoding:\n      codec: '"'"'json'"'"'\n    method: '"'"'post'"'"'\n    request:\n      retry_max_duration_secs: 30\n      retry_initial_backoff_secs: 1\n      headers:\n        x-api-key: ${LOGFLARE_PUBLIC_ACCESS_TOKEN?LOGFLARE_PUBLIC_ACCESS_TOKEN is required}\n    uri: '"'"'http://analytics:4000/api/logs?source_name=storage.logs.prod.2'"'"'\n  logflare_kong:\n    type: '"'"'http'"'"'\n    inputs:\n      - kong_logs\n      - kong_err\n    encoding:\n      codec: '"'"'json'"'"'\n    method: '"'"'post'"'"'\n    request:\n      retry_max_duration_secs: 30\n      retry_initial_backoff_secs: 1\n      headers:\n        x-api-key: ${LOGFLARE_PUBLIC_ACCESS_TOKEN?LOGFLARE_PUBLIC_ACCESS_TOKEN is required}\n    uri: '"'"'http://analytics:4000/api/logs?source_name=cloudflare.logs.prod'"'"'\n' > /etc/vector/vector.yml
        - 'CMD ["--config", "/etc/vector/vector.yml"]'
      serviceUpdateOverride:
        EndpointSpec:
          Mode: "dnsrr"
  $$cap_appname-supavisor:
    restart: "unless-stopped"
    depends_on:
      - "$$cap_appname-db"
    ports:
      - "$$cap_postgres_session_port:5432"
      - "$$cap_postgres_transaction_port:6543"
    environment:
      PORT: "4000"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "$$cap_postgres_db"
      POSTGRES_PASSWORD: "$$cap_postgres_password"
      DATABASE_URL: "ecto://supabase_admin:$$cap_postgres_password@srv-captain--$$cap_appname-db:5432/_supabase"
      CLUSTER_POSTGRES: "true"
      SECRET_KEY_BASE: "$$cap_secret_key_base"
      VAULT_ENC_KEY: "$$cap_vault_enc_key"
      API_JWT_SECRET: "$$cap_jwt_secret"
      METRICS_JWT_SECRET: "$$cap_jwt_secret"
      REGION: "local"
      ERL_AFLAGS: "-proto_dist inet_tcp"
      POOLER_TENANT_ID: "$$cap_pooler_tenant_id"
      POOLER_DEFAULT_POOL_SIZE: "$$cap_pooler_default_pool_size"
      POOLER_MAX_CLIENT_CONN: "$$cap_pooler_max_client_conn"
      POOLER_POOL_MODE: "transaction"
      DB_POOL_SIZE: "$$cap_pooler_db_pool_size"
    caproverExtra:
      notExposeAsWebApp: "true"
      dockerfileLines:
        - "FROM supabase/supavisor:$$cap_supavisor_version"
        - |-
          RUN mkdir -p /etc/pooler && \
              printf '%b' '{:ok, _} = Application.ensure_all_started(:supavisor)\n\n{:ok, version} =\n  case Supavisor.Repo.query!("select version()") do\n    %{rows: [[ver]]} -> Supavisor.Helpers.parse_pg_version(ver)\n    _ -> nil\n  end\n\nparams = %{\n  "external_id" => System.get_env("POOLER_TENANT_ID"),\n  "db_host" => "srv-captain--$$cap_appname-db",\n  "db_port" => System.get_env("POSTGRES_PORT"),\n  "db_database" => System.get_env("POSTGRES_DB"),\n  "require_user" => false,\n  "auth_query" => "SELECT * FROM pgbouncer.get_auth($1)",\n  "default_max_clients" => System.get_env("POOLER_MAX_CLIENT_CONN"),\n  "default_pool_size" => System.get_env("POOLER_DEFAULT_POOL_SIZE"),\n  "default_parameter_status" => %{"server_version" => version},\n  "users" => [%{\n    "db_user" => "pgbouncer",\n    "db_password" => System.get_env("POSTGRES_PASSWORD"),\n    "mode_type" => System.get_env("POOLER_POOL_MODE"),\n    "pool_size" => System.get_env("POOLER_DEFAULT_POOL_SIZE"),\n    "is_manager" => true\n  }]\n}\n\nif !Supavisor.Tenants.get_tenant_by_external_id(params["external_id"]) do\n  {:ok, _} = Supavisor.Tenants.create_tenant(params)\nend\n' > /etc/pooler/pooler.exs
        - "CMD [\"/bin/sh\", \"-c\", \"/app/bin/migrate && /app/bin/supavisor eval \\\"$(cat /etc/pooler/pooler.exs)\\\" && /app/bin/server\"]"
caproverOneClickApp:
  variables:
    - id: "$$cap_studio_version"
      label: "Studio image tag"
      defaultValue: "2026.03.16-sha-5528817"
      description: "Pinned from the current official Supabase self-host Docker stack."
      validRegex: "/^([^\\s^\\/])+$/"
    - id: "$$cap_kong_version"
      label: "Kong image tag"
      defaultValue: "3.9.1"
      validRegex: "/^([^\\s^\\/])+$/"
    - id: "$$cap_auth_version"
      label: "Auth image tag"
      defaultValue: "v2.186.0"
      validRegex: "/^([^\\s^\\/])+$/"
    - id: "$$cap_rest_version"
      label: "PostgREST image tag"
      defaultValue: "v14.6"
      validRegex: "/^([^\\s^\\/])+$/"
    - id: "$$cap_realtime_version"
      label: "Realtime image tag"
      defaultValue: "v2.76.5"
      validRegex: "/^([^\\s^\\/])+$/"
    - id: "$$cap_storage_version"
      label: "Storage image tag"
      defaultValue: "v1.44.2"
      validRegex: "/^([^\\s^\\/])+$/"
    - id: "$$cap_imgproxy_version"
      label: "imgproxy image tag"
      defaultValue: "v3.30.1"
      validRegex: "/^([^\\s^\\/])+$/"
    - id: "$$cap_meta_version"
      label: "postgres-meta image tag"
      defaultValue: "v0.95.2"
      validRegex: "/^([^\\s^\\/])+$/"
    - id: "$$cap_functions_version"
      label: "Edge Runtime image tag"
      defaultValue: "v1.71.2"
      validRegex: "/^([^\\s^\\/])+$/"
    - id: "$$cap_analytics_version"
      label: "Analytics image tag"
      defaultValue: "1.31.2"
      validRegex: "/^([^\\s^\\/])+$/"
    - id: "$$cap_db_version"
      label: "Postgres image tag"
      defaultValue: "15.8.1.085"
      validRegex: "/^([^\\s^\\/])+$/"
    - id: "$$cap_vector_version"
      label: "Vector image tag"
      defaultValue: "0.53.0-alpine"
      validRegex: "/^([^\\s^\\/])+$/"
    - id: "$$cap_supavisor_version"
      label: "Supavisor image tag"
      defaultValue: "2.7.4"
      validRegex: "/^([^\\s^\\/])+$/"
    - id: "$$cap_public_url"
      label: "Public Supabase URL"
      defaultValue: "https://$$cap_appname.$$cap_root_domain"
      description: "The public URL users will use for Studio, REST, Auth, Storage, and Realtime through Kong."
      validRegex: "/^https?:\\/\\/.+$/"
    - id: "$$cap_site_url"
      label: "Default Auth Site URL"
      defaultValue: "https://$$cap_appname.$$cap_root_domain"
      description: "Default redirect base for Auth."
      validRegex: "/^https?:\\/\\/.+$/"
    - id: "$$cap_additional_redirect_urls"
      label: "Additional redirect URLs"
      defaultValue: ""
      description: "Comma-separated or blank."
    - id: "$$cap_postgres_db"
      label: "Postgres database"
      defaultValue: "postgres"
      validRegex: "/.{1,}/"
    - id: "$$cap_postgres_password"
      label: "Postgres password"
      defaultValue: "$$cap_gen_random_hex(32)"
      validRegex: "/.{1,}/"
    - id: "$$cap_postgres_session_port"
      label: "Supavisor session mode port"
      defaultValue: ""
      description: "Required unique host port for direct public/session-mode pooler access. Choose an unused port on this CapRover host."
      validRegex: "/^\\d+$/"
    - id: "$$cap_postgres_transaction_port"
      label: "Supavisor transaction mode port"
      defaultValue: ""
      description: "Required unique host port for direct public/transaction-mode pooler access. Choose an unused port on this CapRover host."
      validRegex: "/^\\d+$/"
    - id: "$$cap_jwt_secret"
      label: "JWT secret"
      defaultValue: "$$cap_gen_random_hex(64)"
      description: "Required shared signing secret. Legacy anon and service_role API keys are auto-generated from this value when left blank."
      validRegex: "/.{32,}/"
    - id: "$$cap_anon_key"
      label: "ANON_KEY"
      defaultValue: ""
      description: "Optional override. Leave blank to auto-generate a legacy anon API key from JWT secret."
    - id: "$$cap_service_role_key"
      label: "SERVICE_ROLE_KEY"
      defaultValue: ""
      description: "Optional override. Leave blank to auto-generate a legacy service_role API key from JWT secret."
    - id: "$$cap_publishable_key"
      label: "SUPABASE_PUBLISHABLE_KEY"
      defaultValue: ""
      description: "Optional advanced override for opaque publishable keys. Leave blank for the simpler legacy-key flow."
    - id: "$$cap_secret_key"
      label: "SUPABASE_SECRET_KEY"
      defaultValue: ""
      description: "Optional advanced override for opaque secret keys. Leave blank for the simpler legacy-key flow."
    - id: "$$cap_anon_key_asymmetric"
      label: "ANON_KEY_ASYMMETRIC"
      defaultValue: ""
      description: "Optional advanced override used only with opaque keys."
    - id: "$$cap_service_role_key_asymmetric"
      label: "SERVICE_ROLE_KEY_ASYMMETRIC"
      defaultValue: ""
